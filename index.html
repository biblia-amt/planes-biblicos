<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Planes</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h1>Panel de Planes</h1>

    <div class="card">
      <div class="field-row">
        <div class="field-label">ID</div>
        <div class="field-control">
          <input id="id" placeholder="ID">
        </div>
      </div>

      <div class="field-row">
        <div class="field-label">Título</div>
        <div class="field-control">
          <input id="title" placeholder="Título">
        </div>
      </div>

      <div class="field-row">
        <div class="field-label">Subtítulo</div>
        <div class="field-control">
          <input id="subtitle" placeholder="Subtítulo">
        </div>
      </div>

      <div class="field-row">
        <div class="field-label">Minutos</div>
        <div class="field-control">
          <input id="minutes" type="number" placeholder="Minutos">
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Learning Points</h3>
      <div id="learningList"></div>
      <button onclick="addLearning()">+ Agregar</button>
    </div>

    <div class="card">
      <h3>Días</h3>
      <div id="days"></div>
      <button onclick="addDay()">+ Día</button>
    </div>

    <div class="card">
      <div class="actions-row">
        <button onclick="generateJSON()">Generar JSON</button>
        <button onclick="downloadJSON()">Descargar</button>
      </div>

      <div class="field-row section-row">
        <div class="field-label">JSON</div>
        <div class="field-control">
          <textarea id="output" placeholder="Aquí aparecerá el JSON"></textarea>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
