<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Planes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>Crear Plan Bíblico</h1>

  <!-- INFO GENERAL -->
  <div class="card">
    <input id="id" placeholder="ID del plan">
    <input id="title" placeholder="Título">
    <input id="subtitle" placeholder="Subtítulo">
    <input id="minutes" type="number" placeholder="Minutos estimados">
  </div>

  <!-- LEARNING POINTS -->
  <div class="card">
    <h3>Lo que aprenderán</h3>
    <div id="learningList"></div>
    <button onclick="addLearning()">+ Agregar punto</button>
  </div>

  <!-- DAYS -->
  <div class="card">
    <h3>Días</h3>
    <div id="days"></div>
    <button onclick="addDay()">+ Agregar día</button>
  </div>

  <!-- EXPORT -->
  <div class="card">
    <button onclick="generateJSON()">Generar JSON</button>
    <pre id="output"></pre>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
